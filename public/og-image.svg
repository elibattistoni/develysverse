<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080012" />
      <stop offset="100%" stop-color="#0a0016" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.22" />
      <stop offset="45%" stop-color="#9333ea" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orbital-soft">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0.9" />
      <stop offset="35%" stop-color="#c084fc" stop-opacity="0.55" />
      <stop offset="70%" stop-color="#c084fc" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0" />
    </radialGradient>
    <filter id="orbital-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b" />
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  <!-- Soft purple radial glow anchored where the glyph sits (top-right) -->
  <ellipse cx="1000" cy="285" rx="280" ry="240" fill="url(#glow)" />

  <!-- Section label divider -->
  <line x1="80" y1="232" x2="116" y2="232" stroke="#7c3aed" stroke-width="2" opacity="0.85" />

  <!-- Section label -->
  <text x="128" y="237" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" fill="#9333ea" letter-spacing="5.4" font-weight="500">SOFTWARE DEVELOPER · COGNITIVE SCIENTIST</text>

  <!-- Tagline line 1 -->
  <text x="80" y="328" font-family="'Cormorant Garamond', Cormorant, Garamond, 'Times New Roman', serif" font-size="60" font-weight="300" fill="#e2e8f0">I studied how brains see.</text>

  <!-- Tagline line 2 -->
  <text x="80" y="404" font-family="'Cormorant Garamond', Cormorant, Garamond, 'Times New Roman', serif" font-size="60" font-weight="600" fill="#c084fc">Now I build what they look at.</text>

  <!-- Footer label divider -->
  <line x1="80" y1="540" x2="110" y2="540" stroke="#475569" stroke-width="1.5" opacity="0.7" />

  <!-- Footer label -->
  <text x="120" y="544" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" fill="#64748b" letter-spacing="4" font-weight="400">DEVELYS·VERSE · ELISA BATTISTONI</text>

  <!-- Brain-network glyph anchored top-right, smaller (260px), no longer overlapping the text -->
  <g transform="translate(880 155) scale(2.6)" filter="url(#orbital-glow)">
    <circle cx="50" cy="50" r="22" fill="url(#orbital-soft)" opacity="0.32" />
    <line x1="50" y1="50" x2="34.95" y2="8.65" stroke="#c084fc" stroke-width="0.7" opacity="0.55" stroke-linecap="round" />
    <circle cx="34.95" cy="8.65" r="1.45" fill="#c084fc" />
    <line x1="50" y1="50" x2="66.06" y2="15.56" stroke="#c084fc" stroke-width="0.7" opacity="0.55" stroke-linecap="round" />
    <circle cx="66.06" cy="15.56" r="1.45" fill="#c084fc" />
    <line x1="50" y1="50" x2="93.23" y2="34.27" stroke="#c084fc" stroke-width="0.7" opacity="0.55" stroke-linecap="round" />
    <circle cx="93.23" cy="34.27" r="1.45" fill="#c084fc" />
    <line x1="50" y1="50" x2="81.18" y2="68.00" stroke="#c084fc" stroke-width="0.7" opacity="0.55" stroke-linecap="round" />
    <circle cx="81.18" cy="68.00" r="1.45" fill="#c084fc" />
    <line x1="50" y1="50" x2="57.29" y2="91.36" stroke="#c084fc" stroke-width="0.7" opacity="0.55" stroke-linecap="round" />
    <circle cx="57.29" cy="91.36" r="1.45" fill="#c084fc" />
    <line x1="50" y1="50" x2="21.72" y2="78.28" stroke="#c084fc" stroke-width="0.7" opacity="0.55" stroke-linecap="round" />
    <circle cx="21.72" cy="78.28" r="1.45" fill="#c084fc" />
    <line x1="50" y1="50" x2="6.17" y2="53.83" stroke="#c084fc" stroke-width="0.7" opacity="0.55" stroke-linecap="round" />
    <circle cx="6.17" cy="53.83" r="1.45" fill="#c084fc" />
    <circle cx="50" cy="50" r="4.5" fill="#0a0016" stroke="#c084fc" stroke-width="1.4" />
    <circle cx="50" cy="50" r="2" fill="#c084fc" />
  </g>
</svg>
